<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savings Tracker - Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f8f9fa;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666666;
      --color-border-primary: #cccccc;
      --color-border-secondary: #e0e0e0;
      --color-border-tertiary: #f0f0f0;
      --border-radius-md: 6px;
      --border-radius-lg: 8px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="active">Dashboard</a>
    <a href="register.html">Register</a>
  </nav>

  <div class="wrap">
    <h1>Savings Tracker Dashboard</h1>

    <div class="nav-row">
      <button class="nav-btn" onclick="changeMonth(-1)">←</button>
      <span class="month-label" id="month-label"></span>
      <button class="nav-btn" onclick="changeMonth(1)">→</button>
    </div>
    <div class="metrics" id="metrics"></div>
    <p class="section-title">Monthly cash flow</p>
    <div class="legend">
      <span class="legend-item"><span class="legend-sq" style="background:#639922;"></span>Take-home (after savings)</span>
      <span class="legend-item"><span class="legend-sq" style="background:#E24B4A;"></span>Total saved/invested</span>
      <span class="legend-item"><span class="legend-sq" style="background:#378ADD;"></span>Cumulative savings</span>
    </div>
    <div class="chart-wrap">
      <canvas id="overviewChart" role="img" aria-label="Bar chart showing monthly income breakdown and cumulative savings over 12 months">Monthly cash flow overview chart</canvas>
    </div>

    <p class="section-title">Active savings plans</p>
    <div class="accounts" id="accounts-grid"></div>
    <p class="section-title">Savings timeline (12 months from Apr 2025)</p>
    <div id="timeline-section"></div>
  </div>

  <script src="lib/chart.umd.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
